version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: finance_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://finance_user:finance_password@db:5432/finance_db?schema=public
      - JWT_SECRET=change_me_in_production_super_secret_key_123
      # You can manage Google API Keys via the in-app Settings UI, 
      # or supply them here:
      # - GOOGLE_CLIENT_ID=your_client_id
      # - GOOGLE_CLIENT_SECRET=your_client_secret
      # - GOOGLE_REDIRECT_URI=http://your-vm-ip:3000/api/email/callback
    depends_on:
      - db
    # Automatically sync DB schema, create default admin if needed, and start Next.js
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             npx ts-node scripts/create-admin.ts || true &&
             npm start"

  worker:
    build: .
    container_name: finance_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://finance_user:finance_password@db:5432/finance_db?schema=public
      - API_BASE_URL=http://web:3000
    depends_on:
      - web
    command: npm run worker

volumes:
  postgres_data:
